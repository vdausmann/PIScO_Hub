<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}PIScO Hub{% endblock %}</title>
    <style>
        :root { --bg: #f4f4f9; --text: #333; --card: #fff; --accent: #2563eb; }
        [data-theme="dark"] { --bg: #1a1a1a; --text: #e5e7eb; --card: #2d2d2d; --accent: #60a5fa; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; transition: 0.3s; }
        .nav { padding: 1rem; display: flex; justify-content: space-between; background: var(--card); }
        .container { padding: 2rem; }
        button { cursor: pointer; border-radius: 4px; border: none; padding: 8px 16px; }
		.nav a:hover b {
			opacity: 0.7;
			transition: 0.2s;
		}
    </style>
	<link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <nav class="nav">
		<a href="{{ url_for('index') }}" style="text-decoration: none; color: inherit;">
			<span><c>PIScOHub</c></span>
		</a>
        <div>
            <button id="theme-toggle">🌓 Theme</button>
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('auth.logout') }}">Logout</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        const btn = document.getElementById('theme-toggle');
        const setTheme = (t) => {
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
        };
        if (localStorage.getItem('theme')) setTheme(localStorage.getItem('theme'));
        btn.onclick = () => {
            let t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            setTheme(t);
        };
    </script>
</body>
</html>
