{% extends 'base.html' %}
{% block content %}
<h1>Dashboard</h1>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <a href="{{ url_for('processing.hub') }}" style="text-decoration:none; color:inherit;">
        <div style="background:var(--card); padding:20px; border-radius:8px; border: 2px solid var(--accent);">
            <h3>Processing Hub</h3>
            <p>Configure and run processing software on PIScO data.</p>
        </div>
    </a>

    <a href="{{ url_for('visualization.hub') }}" style="text-decoration:none; color:inherit;">
        <div style="background:var(--card); padding:20px; border-radius:12px; border: 2px solid #10b981; transition: 0.2s;">
            <h3 style="color: #10b981;">📊 Visualization Hub</h3>
            <p>Analyze results and generate plots from processed data.</p>
        </div>
    </a>

</div>
{% endblock %}
