<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Scientific Hub</title>
    <style>
        :root { --bg: #f4f4f9; --text: #333; --card: #fff; --accent: #2563eb; }
        [data-theme="dark"] { --bg: #1a1a1a; --text: #e5e7eb; --card: #2d2d2d; --accent: #60a5fa; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: var(--card); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; background: var(--accent); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
    </style>
	<link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>
    <div class="login-card">
        <h2>Login</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Enter Hub</button>
        </form>
    </div>
    <script>
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) document.documentElement.setAttribute('data-theme', currentTheme);
    </script>
</body>
</html>
