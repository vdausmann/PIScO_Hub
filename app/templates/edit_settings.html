{% extends "base.html" %}
{% block content %}
<style>
    .field { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    textarea { width: 100%; height: 300px; font-family: monospace; padding: 10px; }
    input { width: 100px; padding: 5px; }
</style>

<div class="max-w-4xl mx-auto mt-8">
    <h2>Editing: {{ tool_name }} (Step {{ idx }})</h2>
    
    <form action="/create-workflow" method="GET">
        <div class="field">
            <label>Priority</label>
            <input type="number" name="priority" value="{{ priority }}">
        </div>

        <div class="field">
            <label>Weight</label>
            <input type="number" name="weight" value="{{ weight }}">
        </div>

        <div class="field">
            <label>Settings String</label>
            <textarea name="settings">{{ settings }}</textarea>
        </div>

        <button type="submit" style="padding: 10px 20px; background: green; color: white; border: none; cursor: pointer;">
            SAVE AND RETURN
        </button>
    </form>
</div>
{% endblock %}
