{% extends "base.html" %}

{% block content %}
<style>
    .editor-container { max-width: 900px; margin: 40px auto; font-family: monospace; }
    .form-section { background: #f8fafc; border: 1px solid #e2e8f0; padding: 2rem; border-radius: 8px; }
    .input-group { margin-bottom: 1.5rem; }
    label { display: block; font-weight: bold; margin-bottom: 0.5rem; color: #475569; }
    
    input[type="number"] { width: 120px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; }
    textarea { 
        width: 100%; height: 400px; padding: 1rem; border: 1px solid #cbd5e1; 
        border-radius: 4px; font-family: 'Courier New', monospace; background: #fff;
    }
    
    .actions { display: flex; justify-content: space-between; margin-top: 2rem; }
    .btn { padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; text-decoration: none; }
    .btn-save { background: #2563eb; color: white; border: none; }
    .btn-cancel { background: #64748b; color: white; border: none; }
</style>

<div class="editor-container">
    <div style="margin-bottom: 2rem;">
        <h1 style="margin: 0;">Task Settings: {{ task.tool.name }}</h1>
        <p style="color: #64748b;">Step #{{ task.workflow_position + 1 }} in Workflow {{ task.workflow_id[:8] }}</p>
    </div>

    <form action="{{ url_for('workflow.edit_settings', task_id=task.id) }}" method="POST" class="form-section">
        <div style="display: flex; gap: 2rem;">
            <div class="input-group">
                <label for="priority">Execution Priority</label>
                <input type="number" id="priority" name="priority" value="{{ task.priority }}">
            </div>

            <div class="input-group">
                <label for="weight">Resource Weight</label>
                <input type="number" id="weight" name="weight" value="{{ task.weight }}">
            </div>
        </div>

        <div class="input-group">
            <label for="settings_string">Configuration</label>
            <textarea id="settings_string" name="settings_string">{{ task.settings }}</textarea>
        </div>

        <div class="actions">
            <a href="{{ url_for('workflow.builder', workflow_id=task.workflow_id) }}" class="btn btn-cancel">CANCEL</a>
            <button type="submit" class="btn btn-save">APPLY & RETURN</button>
        </div>
    </form>
</div>
{% endblock %}
