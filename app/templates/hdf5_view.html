{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h1>Inspecting: {{ filename }}</h1>
    <a href="{{ url_for('visualization.hub') }}" style="color: var(--accent);">&larr; Back to Hub</a>
</div>

<div style="background: var(--card); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead style="background: rgba(0,0,0,0.05);">
            <tr>
                <th style="padding: 12px;">Path</th>
                <th style="padding: 12px;">Type</th>
                <th style="padding: 12px;">Shape</th>
                <th style="padding: 12px;">Datatype</th>
            </tr>
        </thead>
        <tbody>
            {% for item in structure %}
            <tr style="border-top: 1px solid rgba(0,0,0,0.1);">
                <td style="padding: 12px; font-family: monospace;">{{ item.full_path }}</td>
                <td style="padding: 12px;">
                    <span style="padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; background: {{ '#2563eb' if item.type == 'Group' else '#10b981' }}; color: white;">
                        {{ item.type }}
                    </span>
                </td>
                <td style="padding: 12px; font-family: monospace;">{{ item.shape if item.shape else '-' }}</td>
                <td style="padding: 12px; font-family: monospace;">{{ item.dtype if item.dtype else '-' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
